{% extends "base.html" %}

{% block title %}Editar Tipo de Orden - {{ tipo.nombre_tipo }}{% endblock %}

{% block content %}
<div class="card" style="max-width: 700px; margin: 0 auto;">
    <div class="page-header">
        <div>
            <h1 class="page-title">✏️ Editar Tipo de Orden</h1>
            <p style="color: #718096; margin-top: 0.5rem;">Modifica {{ tipo.nombre_tipo }}</p>
        </div>
    </div>
    
    <form method="POST">
        <div class="form-grid">
            <div class="form-group full-width">
                <label for="nombre_tipo">Nombre del Tipo *</label>
                <input type="text" id="nombre_tipo" name="nombre_tipo" class="form-control" required 
                       value="{{ tipo.nombre_tipo }}">
            </div>
            
            <div class="form-group full-width">
                <label for="descripcion">Descripción</label>
                <textarea id="descripcion" name="descripcion" class="form-control">{{ tipo.descripcion or '' }}</textarea>
            </div>
            
            <div class="form-group full-width">
                <label style="display: flex; align-items: center; gap: 0.75rem; cursor: pointer;">
                    <input type="checkbox" name="requiere_aprobacion" {% if tipo.requiere_aprobacion %}checked{% endif %}>
                    <span>Requiere aprobación especial antes de ejecutarse</span>
                </label>
            </div>
        </div>
        
        <div style="display: flex; gap: 1rem; margin-top: 2rem; justify-content: flex-end;">
            <a href="{{ url_for('tipo_orden.listar_tipos') }}" class="btn btn-secondary">
                Cancelar
            </a>
            <button type="submit" class="btn btn-primary">
                💾 Guardar Cambios
            </button>
        </div>
    </form>
</div>
{% endblock %}
