{% extends "base.html" %}

{% block title %}Nuevo Tipo de Orden{% endblock %}

{% block content %}
<div class="card" style="max-width: 700px; margin: 0 auto;">
    <div class="page-header">
        <div>
            <h1 class="page-title">➕ Nuevo Tipo de Orden</h1>
            <p style="color: #718096; margin-top: 0.5rem;">Define un nuevo tipo de orden de servicio</p>
        </div>
    </div>
    
    <form method="POST">
        <div class="form-grid">
            <div class="form-group full-width">
                <label for="nombre_tipo">Nombre del Tipo *</label>
                <input type="text" id="nombre_tipo" name="nombre_tipo" class="form-control" required 
                       placeholder="Ej: Reparación Urgente, Garantía" 
                       value="{{ request.form.get('nombre_tipo', '') }}">
            </div>
            
            <div class="form-group full-width">
                <label for="descripcion">Descripción</label>
                <textarea id="descripcion" name="descripcion" class="form-control" 
                          placeholder="Describe las características de este tipo de orden...">{{ request.form.get('descripcion', '') }}</textarea>
            </div>
            
            <div class="form-group full-width">
                <label style="display: flex; align-items: center; gap: 0.75rem; cursor: pointer;">
                    <input type="checkbox" name="requiere_aprobacion" {% if request.form.get('requiere_aprobacion') %}checked{% endif %}>
                    <span>Requiere aprobación especial antes de ejecutarse</span>
                </label>
            </div>
        </div>
        
        <div style="display: flex; gap: 1rem; margin-top: 2rem; justify-content: flex-end;">
            <a href="{{ url_for('tipo_orden.listar_tipos') }}" class="btn btn-secondary">
                Cancelar
            </a>
            <button type="submit" class="btn btn-primary">
                💾 Guardar Tipo
            </button>
        </div>
    </form>
</div>
{% endblock %}
