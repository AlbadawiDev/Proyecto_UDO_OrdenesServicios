{% extends "base.html" %}

{% block title %}Editar Cliente - {{ cliente.nombre }} {{ cliente.apellido }}{% endblock %}

{% block content %}
<div class="card" style="max-width: 800px; margin: 0 auto;">
    <div class="page-header">
        <div>
            <h1 class="page-title">✏️ Editar Cliente</h1>
            <p style="color: #718096; margin-top: 0.5rem;">Modifica la información de {{ cliente.nombre }} {{ cliente.apellido }}</p>
        </div>
    </div>
    
    <form method="POST">
        <div class="form-grid">
            <div class="form-group">
                <label for="nombre">Nombre *</label>
                <input type="text" id="nombre" name="nombre" class="form-control" required 
                       value="{{ cliente.nombre }}">
            </div>
            
            <div class="form-group">
                <label for="apellido">Apellido *</label>
                <input type="text" id="apellido" name="apellido" class="form-control" required 
                       value="{{ cliente.apellido }}">
            </div>
            
            <div class="form-group">
                <label for="cedula">Cédula *</label>
                <input type="text" id="cedula" name="cedula" class="form-control" required 
                       value="{{ cliente.cedula }}">
            </div>
            
            <div class="form-group">
                <label for="telefono">Teléfono</label>
                <input type="tel" id="telefono" name="telefono" class="form-control" 
                       value="{{ cliente.telefono or '' }}">
            </div>
            
            <div class="form-group">
                <label for="email">Correo Electrónico</label>
                <input type="email" id="email" name="email" class="form-control" 
                       value="{{ cliente.email or '' }}">
            </div>
        </div>
        
        <div class="form-group full-width" style="margin-top: 1.5rem;">
            <label for="direccion">Dirección</label>
            <textarea id="direccion" name="direccion" class="form-control">{{ cliente.direccion or '' }}</textarea>
        </div>
        
        <div style="display: flex; gap: 1rem; margin-top: 2rem; justify-content: flex-end;">
            <a href="{{ url_for('cliente.listar_clientes') }}" class="btn btn-secondary">
                Cancelar
            </a>
            <button type="submit" class="btn btn-primary">
                💾 Guardar Cambios
            </button>
        </div>
    </form>
</div>
{% endblock %}
