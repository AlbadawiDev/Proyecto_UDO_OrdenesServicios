{% extends "base.html" %}

{% block title %}Nuevo Cliente{% endblock %}

{% block content %}
<div class="card" style="max-width: 800px; margin: 0 auto;">
    <div class="page-header">
        <div>
            <h1 class="page-title">➕ Nuevo Cliente</h1>
            <p style="color: #718096; margin-top: 0.5rem;">Registra un nuevo cliente en el sistema</p>
        </div>
    </div>
    
    <form method="POST">
        <div class="form-grid">
            <div class="form-group">
                <label for="nombre">Nombre *</label>
                <input type="text" id="nombre" name="nombre" class="form-control" required 
                       placeholder="Ej: María" value="{{ request.form.get('nombre', '') }}">
            </div>
            
            <div class="form-group">
                <label for="apellido">Apellido *</label>
                <input type="text" id="apellido" name="apellido" class="form-control" required 
                       placeholder="Ej: González" value="{{ request.form.get('apellido', '') }}">
            </div>
            
            <div class="form-group">
                <label for="cedula">Cédula *</label>
                <input type="text" id="cedula" name="cedula" class="form-control" required 
                       placeholder="V-87654321" value="{{ request.form.get('cedula', '') }}">
            </div>
            
            <div class="form-group">
                <label for="telefono">Teléfono</label>
                <input type="tel" id="telefono" name="telefono" class="form-control" 
                       placeholder="0412-9876543" value="{{ request.form.get('telefono', '') }}">
            </div>
            
            <div class="form-group">
                <label for="email">Correo Electrónico</label>
                <input type="email" id="email" name="email" class="form-control" 
                       placeholder="cliente@email.com" value="{{ request.form.get('email', '') }}">
            </div>
        </div>
        
        <div class="form-group full-width" style="margin-top: 1.5rem;">
            <label for="direccion">Dirección</label>
            <textarea id="direccion" name="direccion" class="form-control" 
                      placeholder="Dirección completa del cliente...">{{ request.form.get('direccion', '') }}</textarea>
        </div>
        
        <div style="display: flex; gap: 1rem; margin-top: 2rem; justify-content: flex-end;">
            <a href="{{ url_for('cliente.listar_clientes') }}" class="btn btn-secondary">
                Cancelar
            </a>
            <button type="submit" class="btn btn-primary">
                💾 Guardar Cliente
            </button>
        </div>
    </form>
</div>
{% endblock %}
