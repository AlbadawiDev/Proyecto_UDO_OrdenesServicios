{% extends "base.html" %}

{% block title %}Nuevo Servicio{% endblock %}

{% block content %}
<div class="card" style="max-width: 800px; margin: 0 auto;">
    <div class="page-header">
        <div>
            <h1 class="page-title">➕ Nuevo Servicio</h1>
            <p style="color: #718096; margin-top: 0.5rem;">Registra un nuevo servicio ofrecido</p>
        </div>
    </div>
    
    <form method="POST">
        <div class="form-grid">
            <div class="form-group full-width">
                <label for="nombre_servicio">Nombre del Servicio *</label>
                <input type="text" id="nombre_servicio" name="nombre_servicio" class="form-control" required 
                       placeholder="Ej: Reparación de pantalla, Mantenimiento preventivo" 
                       value="{{ request.form.get('nombre_servicio', '') }}">
            </div>
            
            <div class="form-group">
                <label for="costo_base">Costo Base ($)</label>
                <input type="number" id="costo_base" name="costo_base" class="form-control" 
                       placeholder="0.00" step="0.01" min="0"
                       value="{{ request.form.get('costo_base', '') }}">
            </div>
            
            <div class="form-group">
                <label for="tiempo_estimado_horas">Tiempo Estimado (horas)</label>
                <input type="number" id="tiempo_estimado_horas" name="tiempo_estimado_horas" class="form-control" 
                       placeholder="Ej: 2" min="1"
                       value="{{ request.form.get('tiempo_estimado_horas', '') }}">
            </div>
        </div>
        
        <div class="form-group full-width" style="margin-top: 1.5rem;">
            <label for="descripcion">Descripción del Servicio</label>
            <textarea id="descripcion" name="descripcion" class="form-control" 
                      placeholder="Describe detalladamente el servicio...">{{ request.form.get('descripcion', '') }}</textarea>
        </div>
        
        <div style="display: flex; gap: 1rem; margin-top: 2rem; justify-content: flex-end;">
            <a href="{{ url_for('servicio.listar_servicios') }}" class="btn btn-secondary">
                Cancelar
            </a>
            <button type="submit" class="btn btn-primary">
                💾 Guardar Servicio
            </button>
        </div>
    </form>
</div>
{% endblock %}
