{% extends "base.html" %}

{% block title %}Nuevo Equipo{% endblock %}

{% block content %}
<div class="card" style="max-width: 800px; margin: 0 auto;">
    <div class="page-header">
        <div>
            <h1 class="page-title">➕ Nuevo Equipo</h1>
            <p style="color: #718096; margin-top: 0.5rem;">Registra un nuevo equipo o dispositivo</p>
        </div>
    </div>
    
    <form method="POST">
        <div class="form-grid">
            <div class="form-group">
                <label for="nombre_equipo">Nombre del Equipo *</label>
                <input type="text" id="nombre_equipo" name="nombre_equipo" class="form-control" required 
                       placeholder="Ej: Laptop Dell XPS" value="{{ request.form.get('nombre_equipo', '') }}">
            </div>
            
            <div class="form-group">
                <label for="tipo">Tipo *</label>
                <select id="tipo" name="tipo" class="form-control" required>
                    <option value="">Seleccione...</option>
                    <option value="Laptop" {% if request.form.get('tipo') == 'Laptop' %}selected{% endif %}>💻 Laptop</option>
                    <option value="Desktop" {% if request.form.get('tipo') == 'Desktop' %}selected{% endif %}>🖥️ Desktop</option>
                    <option value="Servidor" {% if request.form.get('tipo') == 'Servidor' %}selected{% endif %}>🖥️ Servidor</option>
                    <option value="Impresora" {% if request.form.get('tipo') == 'Impresora' %}selected{% endif %}>🖨️ Impresora</option>
                    <option value="Monitor" {% if request.form.get('tipo') == 'Monitor' %}selected{% endif %}>🖥️ Monitor</option>
                    <option value="Periférico" {% if request.form.get('tipo') == 'Periférico' %}selected{% endif %}>🖱️ Periférico</option>
                    <option value="Otro" {% if request.form.get('tipo') == 'Otro' %}selected{% endif %}>📦 Otro</option>
                </select>
            </div>
            
            <div class="form-group">
                <label for="marca">Marca</label>
                <input type="text" id="marca" name="marca" class="form-control" 
                       placeholder="Ej: Dell, HP, Lenovo" value="{{ request.form.get('marca', '') }}">
            </div>
            
            <div class="form-group">
                <label for="modelo">Modelo</label>
                <input type="text" id="modelo" name="modelo" class="form-control" 
                       placeholder="Ej: XPS 15, ThinkPad T490" value="{{ request.form.get('modelo', '') }}">
            </div>
            
            <div class="form-group">
                <label for="numero_serie">Número de Serie</label>
                <input type="text" id="numero_serie" name="numero_serie" class="form-control" 
                       placeholder="SN123456789" value="{{ request.form.get('numero_serie', '') }}">
            </div>
            
            <div class="form-group">
                <label for="id_cliente">Cliente Propietario *</label>
                <select id="id_cliente" name="id_cliente" class="form-control" required>
                    <option value="">Seleccione un cliente...</option>
                    {% for cliente in clientes %}
                    <option value="{{ cliente.id_cliente }}" {% if request.form.get('id_cliente')|int == cliente.id_cliente %}selected{% endif %}>
                        {{ cliente.nombre }} {{ cliente.apellido }} - {{ cliente.cedula }}
                    </option>
                    {% endfor %}
                </select>
            </div>
        </div>
        
        <div style="display: flex; gap: 1rem; margin-top: 2rem; justify-content: flex-end;">
            <a href="{{ url_for('equipo.listar_equipos') }}" class="btn btn-secondary">
                Cancelar
            </a>
            <button type="submit" class="btn btn-primary">
                💾 Guardar Equipo
            </button>
        </div>
    </form>
</div>
{% endblock %}
